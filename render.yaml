services:
  - type: web
    name: primetrade-task-manager-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        value: postgresql://USER:PASSWORD@HOST:5432/DB_NAME?schema=public
      - key: JWT_SECRET
        value: CHANGE_ME_IN_RENDER_DASHBOARD
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.vercel.app
