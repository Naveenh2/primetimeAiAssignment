version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: primetrade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: primetrade_db
      POSTGRES_USER: primetrade_user
      POSTGRES_PASSWORD: primetrade_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primetrade_user -d primetrade_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: primetrade-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: primetrade-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
